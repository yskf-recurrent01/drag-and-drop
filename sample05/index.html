<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドラッグ＆ドロップ 発展編 -DB連携-</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --drop-zone-bg: #f8f9fa;
      --drop-zone-border: #dee2e6;
      --drop-zone-hover: #e9ecef;
    }

    .drop-zone {
      width: 50%;
      height: 120px;
      vertical-align: middle;
      background-color: var(--drop-zone-bg);
      border: 2px dashed var(--drop-zone-border) !important;
      transition: all 0.2s ease;
      position: relative;
    }

    .drop-zone:hover {
      background-color: var(--drop-zone-hover);
    }

    /* ドラッグオーバー時の強調スタイル（JSで制御用） */
    .drag-over {
      background-color: #e3f2fd !important;
      border-color: #0d6efd !important;
      border-style: solid !important;
    }

    .item {
      cursor: grab;
      user-select: none;
      transition: transform 0.1s ease;
    }

    .item:active {
      cursor: grabbing;
    }

    #alert-wrapper {
      position: fixed;
      width: 100%;
      top: 10%;
      left: 50%;
      translate: -50% 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    [popover].msg-toast {
      position: fixed;
      top: auto;
      right: 20px;
      left: auto;
      bottom: 20px;
      margin: 0;
      border: none;
      min-width: 250px;
      transition: bottom 0.3s ease;

      &:popover-open {
        animation: slide-in 0.3s ease-out
      }
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        translate: 0 20px;
      }

      to {
        opacity: 1;
        translate: 0 0;
      }
    }
  </style>
</head>

<body class="bg-light">
  <main class="container py-5">
    <header class="text-center mb-5">
      <h1 class="display-5 fw-bold">ドラッグ＆ドロップ 発展編<br> -DB連携-</h1>
      <p class="text-muted">ドラッグ&ドロップでタスクを入れ替える度にDBに保存する</p>
      <div id="alert-wrapper"></div>
    </header>
    <div class="row mb-4 justify-content-center">
      <div class="col">
        <button type="button" class="btn btn-primary" id="open-btn">Add Task</button>
      </div>
    </div>
    <dialog class="form p-5" id="modal">
      <div class="row mb-3">
        <div class="col mb-3">
          <label for="task-title" class="form-label">タスク名</label>
          <input type="text" name="task-title" id="task-title" class="form-control">
        </div>
      </div>
      <div class="d-flex gap-3">
        <button class="btn btn-secondary flex-fill" type="button" id="cancel-btn">Cancel</button>
        <button class="btn btn-primary flex-fill" type="button" id="add-btn">Add</button>

      </div>
    </dialog>
    <div class="d-flex gap-4 mt-4">
      <div class="area not-started flex-fill border border-2 border-secondary-subtle rounded-3 p-4 bg-light shadow-sm"
        style="min-height: 400px;">
        <h2 class="h6 text-secondary mb-3"></h2>
      </div>
      <div class="area in-progress flex-fill border border-2 border-primary-subtle rounded-3 p-4 bg-light shadow-sm"
        style="min-height: 400px;">
        <h2 class="h6 mb-3 text-primary"></h2>
      </div>
      <div class="area completed flex-fill border border-2 border-success-subtle rounded-3 p-4 bg-light shadow-sm"
        style="min-height: 400px;">
        <h2 class="h6 text-success mb-3"></h2>
      </div>
    </div>
    <div class="delete-area mt-5 p-5 text-center border border-2 border-danger-subtle">
      Drop here to Delete
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="./script.js"></script>
</body>

</html>
