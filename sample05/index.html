<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドラッグ＆ドロップ 発展編 -データ保存(DB)-</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --drop-zone-bg: #f8f9fa;
      --drop-zone-border: #dee2e6;
      --drop-zone-hover: #e9ecef;
    }

    .drop-zone {
      width: 50%;
      height: 120px;
      vertical-align: middle;
      background-color: var(--drop-zone-bg);
      border: 2px dashed var(--drop-zone-border) !important;
      transition: all 0.2s ease;
      position: relative;
    }

    .drop-zone:hover {
      background-color: var(--drop-zone-hover);
    }

    /* ドラッグオーバー時の強調スタイル（JSで制御用） */
    .drag-over {
      background-color: #e3f2fd !important;
      border-color: #0d6efd !important;
      border-style: solid !important;
    }

    .item {
      cursor: grab;
      user-select: none;
      transition: transform 0.1s ease;
    }

    .item:active {
      cursor: grabbing;
    }

    #alert-wrapper{
      position: fixed;
      width: 100%;
      top: 10%;
      left: 50%;
      translate: -50% 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body class="bg-light">
  <main class="container py-5">
    <header class="text-center mb-5">
      <h1 class="display-5 fw-bold">ドラッグ＆ドロップ 発展編<br> -データ保存(DB)-</h1>
      <p class="text-muted">ドラッグ&ドロップでタスクを入れ替える度にDBに保存する</p>
      <div id="alert-wrapper"></div>
    </header>

    <div class="d-flex gap-4 mt-4">
      <div class="area not-started flex-fill border border-2 border-secondary-subtle rounded-3 p-4 bg-light shadow-sm"
        style="min-height: 400px;">
        <h2 class="h6 text-secondary mb-3">Not Started</h2>
      </div>
      <div class="area in-progress flex-fill border border-2 border-primary-subtle rounded-3 p-4 bg-light shadow-sm"
        style="min-height: 400px;">
        <h2 class="h6 mb-3 text-primary">In Progress</h2>
      </div>
      <div class="area completed flex-fill border border-2 border-success-subtle rounded-3 p-4 bg-light shadow-sm"
        style="min-height: 400px;">
        <h2 class="h6 text-success mb-3">Completed</h2>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="./script.js"></script>
</body>

</html>
